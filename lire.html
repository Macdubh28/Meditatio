<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pensées pour moi-même - Meditatio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Meditatio</h1>
      <button id="theme-toggle" class="theme-btn">☀️</button>
    </div>
  </header>

  <nav class="main-nav">
    <div class="container">
      <a href="index.html">Accueil</a>
      <a href="maitres.html">Les Maîtres</a>
      <a href="oeuvres.html">Les Œuvres</a>
      <a href="focus.html">Mode Focus</a>
    </div>
  </nav>

  <main class="container">
    <h2>Pensées pour moi-même</h2>
    <p class="author">Marc Aurèle — Livre II</p>

    <div id="content" class="reading-area">
      <p>Chargement des textes...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Meditatio — Stoïcisme Antique</p>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://elzsxawxulmtmnasnmmt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__njQ52xCdOBGM2oqf8Z2oQ_rhdm2r9k';

    async function loadParagraphs() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/paragraphs?select=*&order=paragraph_number`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const data = await response.json();

      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '';

      data.forEach(p => {
        const pElement = document.createElement('p');
        pElement.innerHTML = `<strong>${p.paragraph_number}.</strong> ${p.content}`;
        contentDiv.appendChild(pElement);
      });
    }

    loadParagraphs();
  </script>

  <script src="script.js"></script>
</body>
</html>
