<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Focus - Meditatio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #1c1810;
      color: #e8d9b8;
      font-size: 1.5rem;
      line-height: 1.95;
      padding: 40px 25px;
      margin: 0;
    }
    .exit-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      background: #8b5a2b;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 1.05rem;
      z-index: 100;
    }
    .focus-text {
      max-width: 680px;
      margin: 100px auto 0;
      text-align: justify;
    }
  </style>
</head>
<body>
  <button class="exit-btn" onclick="history.back()">← Quitter</button>

  <div class="focus-text">
    <h2 style="text-align:center; margin-bottom:50px;">Mode Focus</h2>
    
    <p>« Souviens-toi que tu es acteur d’une pièce dont l’auteur a choisi le moment, la durée et le rôle. »</p>
    <p style="margin-top:40px; font-size:1.15rem;">— Épictète</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
